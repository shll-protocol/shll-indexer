# docker-compose.yml for Dokploy deployment
version: "3.8"

services:
  shll-indexer:
    image: ghcr.io/kledx/shll-indexer:latest
    pull_policy: always
    restart: unless-stopped
    ports:
      - "42069:42069"
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://shll_ponder_user:uaikotc1x22iwcl1t@infrastructure-base-ufkucm/shll_ponder}
      - DATABASE_SCHEMA=${DATABASE_SCHEMA:-ponder}
      - PONDER_RPC_URL_97=${PONDER_RPC_URL_97:-https://bnb-testnet.g.alchemy.com/v2/CVaHvQCguUQe5C-mRLHWe5qzcCmPkA1T}
      # Optional failover list (comma-separated). If set, takes precedence over PONDER_RPC_URL_97.
      # Example: https://alchemy...,https://data-seed-prebsc-1-s1.bnbchain.org:8545
      - PONDER_RPC_URLS_97=${PONDER_RPC_URLS_97:-}
      # RPC Tuning (used by ponder.config.ts)
      - MAX_REQUESTS_PER_SECOND=${MAX_REQUESTS_PER_SECOND:-1}
      - RPC_MIN_INTERVAL_MS=${RPC_MIN_INTERVAL_MS:-1500}
      - RPC_TIMEOUT_MS=${RPC_TIMEOUT_MS:-5000}
      - POLLING_INTERVAL_MS=${POLLING_INTERVAL_MS:-10000}
      - ETH_GET_LOGS_BLOCK_RANGE=${ETH_GET_LOGS_BLOCK_RANGE:-1}
    networks:
      - dokploy-network

networks:
  dokploy-network:
    external: true
