# docker-compose.yml for Dokploy deployment
version: "3.8"

services:
  shll-indexer:
    image: ghcr.io/kledx/shll-indexer:latest
    pull_policy: always
    restart: unless-stopped
    ports:
      - "42069:42069"
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://user:password@host:5432/dbname}
      - DATABASE_SCHEMA=${DATABASE_SCHEMA:-ponder}
      - PONDER_RPC_URL_97=${PONDER_RPC_URL_97:-https://bsc-testnet-rpc.example.com}
      # Optional failover list (comma-separated). If set, takes precedence over PONDER_RPC_URL_97.
      # Example: https://alchemy...,https://data-seed-prebsc-1-s1.bnbchain.org:8545
      - PONDER_RPC_URLS_97=${PONDER_RPC_URLS_97:-}
      - LISTING_MANAGER_ADDRESS_97=${LISTING_MANAGER_ADDRESS_97:-0x152a2E2ab8F56613F1cB203cD681dEfFcD6c673A}
      - AGENT_NFA_ADDRESS_97=${AGENT_NFA_ADDRESS_97:-0xb1642eA66f4C9A0A148E19bA5A213A7597FeE601}
      - CONTRACT_START_BLOCK_97=${CONTRACT_START_BLOCK_97:-90771192}
      - POLICY_GUARD_V3_ADDRESS_97=${POLICY_GUARD_V3_ADDRESS_97:-0xF8f3757B69Db8737F8dd1E3484d15343a4D21E2e}
      # RPC Tuning (used by ponder.config.ts)
      - MAX_REQUESTS_PER_SECOND=${MAX_REQUESTS_PER_SECOND:-1}
      - RPC_MIN_INTERVAL_MS=${RPC_MIN_INTERVAL_MS:-0}
      - RPC_TIMEOUT_MS=${RPC_TIMEOUT_MS:-5000}
      - RPC_FAILOVER_MAX_ATTEMPTS=${RPC_FAILOVER_MAX_ATTEMPTS:-2}
      - RPC_FAILOVER_COOLDOWN_MS=${RPC_FAILOVER_COOLDOWN_MS:-30000}
      - RPC_FAILOVER_FAILURE_THRESHOLD=${RPC_FAILOVER_FAILURE_THRESHOLD:-2}
      - POLLING_INTERVAL_MS=${POLLING_INTERVAL_MS:-10000}
      - ETH_GET_LOGS_BLOCK_RANGE=${ETH_GET_LOGS_BLOCK_RANGE:-1}
    networks:
      - dokploy-network

networks:
  dokploy-network:
    external: true
