# docker-compose.yml for Dokploy deployment
version: "3.8"

services:
  shll-indexer:
    image: ghcr.io/kledx/shll-indexer:latest
    pull_policy: always
    restart: unless-stopped
    ports:
      - "42069:42069"
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://user:password@host:5432/dbname}
      - DATABASE_SCHEMA=${DATABASE_SCHEMA:-ponder}
      - CHAIN_ID=${CHAIN_ID:-97}

      # ─── BSC Testnet (97) ───
      - PONDER_RPC_URL_97=${PONDER_RPC_URL_97}
      - PONDER_RPC_URLS_97=${PONDER_RPC_URLS_97}
      - AGENT_NFA_ADDRESS_97=${AGENT_NFA_ADDRESS_97}
      - LISTING_MANAGER_ADDRESS_97=${LISTING_MANAGER_ADDRESS_97}
      - POLICY_GUARD_V4_ADDRESS_97=${POLICY_GUARD_V4_ADDRESS_97}
      - CONTRACT_START_BLOCK_97=${CONTRACT_START_BLOCK_97}

      # ─── BSC Mainnet (56) ───
      - PONDER_RPC_URL_56=${PONDER_RPC_URL_56}
      - PONDER_RPC_URLS_56=${PONDER_RPC_URLS_56}
      - AGENT_NFA_ADDRESS_56=${AGENT_NFA_ADDRESS_56}
      - LISTING_MANAGER_ADDRESS_56=${LISTING_MANAGER_ADDRESS_56}
      - POLICY_GUARD_V4_ADDRESS_56=${POLICY_GUARD_V4_ADDRESS_56}
      - CONTRACT_START_BLOCK_56=${CONTRACT_START_BLOCK_56}

      # ─── RPC Tuning ───
      - MAX_REQUESTS_PER_SECOND=${MAX_REQUESTS_PER_SECOND:-1}
      - RPC_MIN_INTERVAL_MS=${RPC_MIN_INTERVAL_MS:-0}
      - RPC_TIMEOUT_MS=${RPC_TIMEOUT_MS:-5000}
      - RPC_FAILOVER_MAX_ATTEMPTS=${RPC_FAILOVER_MAX_ATTEMPTS:-2}
      - RPC_FAILOVER_COOLDOWN_MS=${RPC_FAILOVER_COOLDOWN_MS:-30000}
      - RPC_FAILOVER_FAILURE_THRESHOLD=${RPC_FAILOVER_FAILURE_THRESHOLD:-2}
      - POLLING_INTERVAL_MS=${POLLING_INTERVAL_MS:-10000}
      - ETH_GET_LOGS_BLOCK_RANGE=${ETH_GET_LOGS_BLOCK_RANGE:-1}

    networks:
      - dokploy-network

networks:
  dokploy-network:
    external: true
